<!DOCTYPE HTML>
<html>
    <head>
        <title>Teddy Bear Wheelchair | Media</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <!-- This links back one folder level to your main CSS -->
        <link rel="stylesheet" href="../assets/css/main.css" />
        <style>
            /* Custom styles just for the collage grid */
            body { background: #fff; color: #444; padding: 2em; text-align: center; }
            .collage-container { max-width: 1000px; margin: 0 auto; }
            .media-grid { 
                display: grid; 
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
                gap: 20px; 
                margin-top: 2em;
            }
            .media-grid img { width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .back-btn { margin-bottom: 2em; display: inline-block; }
        </style>
    </head>
    <body>

        <div class="collage-container">
            <!-- Header Section -->
            <header>
                <h2>Teddy Bear Wheelchair</h2>
                <p>First-year engineering design project.</p>
            </header>

            <!-- Media Grid -->
            <div class="media-grid">
                <!-- Replace these with your actual image paths -->
                <img src="../images/Projects/TBWC/TBWC-Hero.jpg" alt="Hero Shot" />
                <img src="../images/hank-cad-2.jpg" alt="Team Photo (Still waiting on Prof for it)" />
                <img src="../images/Projects/TBWC/TBWC-Electronics-Schematic.jpg" alt="Electronics schematic" />
            </div>
            
            <!-- Optional: Video block if you have one -->
            
            <div style="margin-top: 2em;">
                <video width="100%" controls>
                  <source src="../images/Projects/TBWC/TBWC-Launch.mp4" type="video/mp4">
                  <source src="../images/hank-jump.mp4" type="video/mp4">
                  <!-- Your browser does not support the video tag. -->
                </video>
            </div>
            
        </div>

        <div id="image-overlay" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); cursor:zoom-out; align-items:center; justify-content:center;">
            <img id="enlarged-image" src="" style="max-width:90%; max-height:90%; border-radius:4px; box-shadow:0 0 20px rgba(0,0,0,0.5);">
        </div>

        <script src="../assets/js/jquery.min.js"></script>
        <script>
        $(document).ready(function() {
            // When any image in the media-grid is clicked
            $('.media-grid img').css('cursor', 'zoom-in').on('click', function() {
                var src = $(this).attr('src');
                $('#enlarged-image').attr('src', src);
                $('#image-overlay').css('display', 'flex');
            });

            // When the overlay is clicked, hide it
            $('#image-overlay').on('click', function() {
                $(this).hide();
            });
        });
        </script>

    </body>
</html>
